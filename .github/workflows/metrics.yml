name: Metrics

on:
  # Runs every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Also runs on every push to main (so you can trigger it manually via push)
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:

      # ─────────────────────────────────────────────
      # Setup: Check out the repository
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # SECTION 1: Header block — profile overview
      # Base stats: repos, commits, PRs, issues, stars
      # ─────────────────────────────────────────────
      - name: Profile Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.header.svg
          user: SiphiweRadebe
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_forks: yes
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 2: Isometric contribution calendar
      # The 3D calendar you see in Simon's profile
      # ─────────────────────────────────────────────
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.isocalendar.svg
          user: SiphiweRadebe
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 3: Most used languages (detailed)
      # Shows language breakdown across all your repos
      # ─────────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.languages.svg
          user: SiphiweRadebe
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, dockerfile, shell, makefile, batchfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 4: Coding habits
      # Commit times heatmap + commit day distribution
      # ─────────────────────────────────────────────
      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.habits.svg
          user: SiphiweRadebe
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: bar
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 5: Starred topics
      # Displays your GitHub topic interests as badges
      # ─────────────────────────────────────────────
      - name: Starred Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.topics.svg
          user: SiphiweRadebe
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 6: Repository traffic & stars history
      # Tracks your repos' stars, forks, watchers
      # ─────────────────────────────────────────────
      - name: Repository Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.repositories.svg
          user: SiphiweRadebe
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: veil, terrainiq, AzureADUserManager, Environment-Drift, Hackathon_AI_Health, SeleniumPractice
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 7: Recent activity feed
      # Last commits, PRs, issues, reviews
      # ─────────────────────────────────────────────
      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.activity.svg
          user: SiphiweRadebe
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, fork, review, ref/create
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # SECTION 8: Achievements
      # GitHub achievement badges you've earned
      # ─────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.achievements.svg
          user: SiphiweRadebe
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          config_timezone: Africa/Johannesburg

      # ─────────────────────────────────────────────
      # Auto-commit the generated SVGs
      # ─────────────────────────────────────────────
      - name: Commit and push metrics
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update metrics - auto-generated by GitHub Actions"
          default_author: github_actions


